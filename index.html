<!DOCTYPE html>
<html>

<head>
    <title>Third Spaces Near Palumbo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map {
            height: 100vh;
            width: 100%;
        }

        #title {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            font-size: 30px;
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        .leaflet-control a {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        /* Optional hover effect */
        .leaflet-control a:hover {
            background: #f4f4f4;
        }
    </style>
</head>

<body>
    <h1 id="title">Third Spaces Near Palumbo</h1>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="code.js"></script>
</body>

</html>
